name: CI
on: [push, pull_request]
jobs:
  swift:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: swift test
  python:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --project Worker --extra dev --frozen
      - run: uv run --project Worker --no-sync pytest
