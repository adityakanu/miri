name: Community release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: SemVer without the v prefix (for example 0.1.4)
        required: true

permissions:
  contents: write

jobs:
  community:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install build tools
        run: brew install xcodegen

      - name: Build and test
        run: |
          uv sync --project Worker --extra dev --frozen
          make test

      - name: Install bundled Python runtime
        run: uv python install 3.13

      - name: Package ad-hoc signed DMG and ZIP
        id: package
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${INPUT_VERSION:-${GITHUB_REF_NAME#v}}"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          python_path="$(uv python find 3.13)"
          scripts/build-community.sh "$version" "$python_path"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub community release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -euo pipefail
          version="$INPUT_VERSION"
          tag="${GITHUB_REF_NAME:-v$version}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="v$version"
            git tag "$tag" "$GITHUB_SHA"
            git push origin "$tag"
          fi
          gh release create "$tag" \
            "dist/Miri-$version.dmg" \
            "dist/Miri-$version.zip" \
            "dist/Miri-$version.sha256" \
            --verify-tag --generate-notes --title "Miri $version"
